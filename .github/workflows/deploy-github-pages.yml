name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          VITE_SUPABASE_URL: https://ktxlvltheygbhyypnjep.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0eGx2bHRoZXlnYmh5eXBuamVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzkzOTksImV4cCI6MjA5NTE1NTM5OX0.DlTbp9mwS7c88UqgICmkViuf2TlKlR-efnsxFT2BBvY
          VITE_SUPABASE_PROJECT_ID: ktxlvltheygbhyypnjep
          SUPABASE_URL: https://ktxlvltheygbhyypnjep.supabase.co
          SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0eGx2bHRoZXlnYmh5eXBuamVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzkzOTksImV4cCI6MjA5NTE1NTM5OX0.DlTbp9mwS7c88UqgICmkViuf2TlKlR-efnsxFT2BBvY
        run: bun run build:github-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4