name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: false
  NODE_ENV: production
  GITHUB_PAGES: "true"
  VITE_SUPABASE_URL: https://ktxlvltheygbhyypnjep.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imt0eGx2bHRoZXlnYmh5eXBuamVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzkzOTksImV4cCI6MjA5NTE1NTM5OX0.DlTbp9mwS7c88UqgICmkViuf2TlKlR-efnsxFT2BBvY
  VITE_SUPABASE_PROJECT_ID: ktxlvltheygbhyypnjep

jobs:
  install:
    name: 01 Install Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --include=dev
      - run: echo "Install succeeded"

  build:
    name: 02 Build Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --include=dev
      - run: npm run build
      - run: node scripts/prepare-github-pages.mjs

  deploy:
    name: 03 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --include=dev
      - run: npm run build
      - run: node scripts/prepare-github-pages.mjs
      - name: Write sitemap
        run: |
          cat > dist/client/sitemap.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url><loc>https://www.franceshgrace.com/</loc><priority>1.0</priority></url>
            <url><loc>https://www.franceshgrace.com/products</loc><priority>0.9</priority></url>
            <url><loc>https://www.franceshgrace.com/about</loc><priority>0.7</priority></url>
            <url><loc>https://www.franceshgrace.com/blog</loc><priority>0.8</priority></url>
            <url><loc>https://www.franceshgrace.com/distributor</loc><priority>0.8</priority></url>
          </urlset>
          EOF
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client